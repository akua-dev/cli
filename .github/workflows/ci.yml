name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - run: mise run check

  package-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - name: Build and verify all release artifacts
        run: |
          version="$(bun -p "require('./package.json').version")"
          bun scripts/release.ts package --version "$version" --output dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: akua-release-candidate
          path: dist/release/
          if-no-files-found: error

  install-smoke:
    needs: package-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: akua-release-candidate
          path: dist/release
      - name: Extract, install, and smoke ${{ matrix.target }}
        shell: bash
        run: |
          version="$(bun -p "require('./package.json').version")"
          bun scripts/release.ts smoke --version "$version" --output dist/release --target "${{ matrix.target }}"
