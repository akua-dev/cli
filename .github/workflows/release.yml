name: Publish Release Artifacts

on:
  workflow_call:
    inputs:
      tag:
        description: Existing immutable Git tag and GitHub Release name
        required: true
        type: string
      version:
        description: SemVer without the v prefix
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        description: Fine-grained token scoped only to dispatch akua-dev/homebrew-tap
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable Git tag and GitHub Release name
        required: true
        type: string
      version:
        description: SemVer without the v prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - name: Validate tag and package version
        shell: bash
        run: |
          test "${{ inputs.tag }}" = "v${{ inputs.version }}"
          test "$(bun -p "require('./package.json').version")" = "${{ inputs.version }}"
      - run: mise run check
      - name: Build and verify all release artifacts
        run: bun scripts/release.ts package --version "${{ inputs.version }}" --output dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: akua-release-${{ inputs.version }}
          path: dist/release/
          if-no-files-found: error

  install-smoke:
    needs: package
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: akua-release-${{ inputs.version }}
          path: dist/release
      - name: Extract, install, and smoke ${{ matrix.target }}
        shell: bash
        run: bun scripts/release.ts smoke --version "${{ inputs.version }}" --output dist/release --target "${{ matrix.target }}"

  publish:
    needs: [package, install-smoke]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: akua-release-${{ inputs.version }}
          path: dist/release
      - name: Verify release candidate
        run: bun scripts/release.ts verify --version "${{ inputs.version }}" --output dist/release
      - name: Publish assets without replacement
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/release/*
      - name: Download and verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/published
          gh release download "${{ inputs.tag }}" --dir dist/published
          bun scripts/release.ts verify --version "${{ inputs.version }}" --output dist/published

  tap-update:
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Request a reviewed Homebrew formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
        run: |
          jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg release_url "https://github.com/akua-dev/cli/releases/tag/$TAG" \
            --arg homebrew_manifest_url "https://github.com/akua-dev/cli/releases/download/$TAG/akua-v$VERSION-homebrew.json" \
            '{event_type:"akua-cli-release-published",client_payload:{version:$version,tag:$tag,release_url:$release_url,homebrew_manifest_url:$homebrew_manifest_url}}' \
            | gh api --method POST repos/akua-dev/homebrew-tap/dispatches --input -
